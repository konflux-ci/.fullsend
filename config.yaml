# fullsend organization configuration
# https://github.com/fullsend-ai/fullsend
#
# This file is managed by fullsend. Manual edits may be overwritten.
version: "1"
dispatch:
    platform: github-actions
inference:
    provider: vertex
defaults:
    roles:
        - fullsend
        - triage
        - coder
        - review
    max_implementation_retries: 2
    auto_merge: false
agents:
    - role: fullsend
      name: konflux-ci-fullsend
      slug: konflux-ci-fullsend
    - role: triage
      name: konflux-ci-triage
      slug: konflux-ci-triage
    - role: coder
      name: konflux-ci-coder
      slug: konflux-ci-coder
    - role: review
      name: konflux-ci-review
      slug: konflux-ci-review
