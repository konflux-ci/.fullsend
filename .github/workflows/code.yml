# fullsend-stage: code
name: Code

on:
  workflow_dispatch:
    inputs:
      event_type:
        required: true
        type: string
      source_repo:
        required: true
        type: string
      event_payload:
        required: true
        type: string

concurrency:
  group: fullsend-code-${{ fromJSON(inputs.event_payload).issue.number }}
  cancel-in-progress: true

jobs:
  code:
    name: Code
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      id-token: write
      issues: write
      packages: read
      pull-requests: write

    steps:
      - name: Checkout .fullsend repository
        uses: actions/checkout@v6

      - name: Validate enrollment and extract repo metadata
        id: repo-parts
        uses: ./.github/actions/validate-enrollment
        with:
          source_repo: ${{ inputs.source_repo }}

      - name: Generate sandbox token (read-only)
        id: sandbox-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.FULLSEND_CODER_CLIENT_ID }}
          private-key: ${{ secrets.FULLSEND_CODER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ steps.repo-parts.outputs.name }}
          permission-contents: read
          permission-issues: read
          permission-pull-requests: read
          permission-metadata: read

      - name: Generate push token (write)
        id: push-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.FULLSEND_CODER_CLIENT_ID }}
          private-key: ${{ secrets.FULLSEND_CODER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ steps.repo-parts.outputs.name }}

      - name: Checkout target repository
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.source_repo }}
          token: ${{ steps.sandbox-token.outputs.token }}
          path: target-repo
          fetch-depth: 0
          persist-credentials: false

      - name: Validate inputs
        env:
          ISSUE_NUMBER: ${{ fromJSON(inputs.event_payload).issue.number }}
          REPO_FULL_NAME: ${{ inputs.source_repo }}
          GITHUB_ISSUE_URL: ${{ fromJSON(inputs.event_payload).issue.html_url }}
        run: bash scripts/pre-code.sh

      - name: Setup GCP and prepare credentials
        uses: ./.github/actions/setup-gcp
        with:
          gcp_auth_mode: ${{ vars.FULLSEND_GCP_AUTH_MODE }}
          gcp_wif_provider: ${{ secrets.FULLSEND_GCP_WIF_PROVIDER }}
          gcp_wif_sa_email: ${{ secrets.FULLSEND_GCP_WIF_SA_EMAIL }}
          gcp_sa_key_json: ${{ secrets.FULLSEND_GCP_SA_KEY_JSON }}

      - name: Setup agent environment
        env:
          AGENT_PREFIX: CODE_
          CODE_GH_TOKEN: ${{ steps.sandbox-token.outputs.token }}
          CODE_TARGET_REPO_DIR: target-repo
          CODE_ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.FULLSEND_GCP_PROJECT_ID }}
          CODE_CLOUD_ML_REGION: ${{ vars.FULLSEND_GCP_REGION }}
          CODE_ISSUE_NUMBER: ${{ fromJSON(inputs.event_payload).issue.number }}
        run: bash .github/scripts/setup-agent-env.sh

      - name: Run code agent
        uses: ./.github/actions/fullsend
        env:
          GITHUB_ISSUE_URL: ${{ fromJSON(inputs.event_payload).issue.html_url }}
          ISSUE_NUMBER: ${{ fromJSON(inputs.event_payload).issue.number }}
          REPO_FULL_NAME: ${{ inputs.source_repo }}
          PUSH_TOKEN: ${{ steps.push-token.outputs.token }}
          PUSH_TOKEN_SOURCE: github-app
          TARGET_BRANCH: main
        with:
          agent: code
