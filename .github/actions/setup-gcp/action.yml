name: Setup GCP
description: Authenticate to Google Cloud, mask credentials, and prepare sandbox credentials

inputs:
  gcp_auth_mode:
    description: 'GCP authentication mode: "wif" or "sa-key"'
    required: true
  gcp_wif_provider:
    description: 'Workload Identity Federation provider (required if gcp_auth_mode is "wif")'
    required: false
  gcp_wif_sa_email:
    description: 'Service account email for WIF (required if gcp_auth_mode is "wif")'
    required: false
  gcp_sa_key_json:
    description: 'Service account key JSON (required if gcp_auth_mode is not "wif")'
    required: false

runs:
  using: composite
  steps:
    - name: Pre-mask GCP credential file path
      shell: bash
      run: echo "::add-mask::${GITHUB_WORKSPACE}/gha-creds-"

    - name: Authenticate to Google Cloud (WIF)
      if: inputs.gcp_auth_mode == 'wif'
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ inputs.gcp_wif_provider }}
        service_account: ${{ inputs.gcp_wif_sa_email }}

    - name: Authenticate to Google Cloud (SA key)
      if: inputs.gcp_auth_mode != 'wif'
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ inputs.gcp_sa_key_json }}

    # GCP_OIDC_TOKEN_FILE is expected by google-github-actions/auth when using
    # WIF. For non-WIF (SA key), we set it to an empty file to avoid undefined
    # variable errors in downstream steps that may reference it.
    - name: Set GCP_OIDC_TOKEN_FILE for non-WIF
      if: inputs.gcp_auth_mode != 'wif'
      shell: bash
      run: |
        touch "$RUNNER_TEMP/empty-oidc-token"
        echo "GCP_OIDC_TOKEN_FILE=$RUNNER_TEMP/empty-oidc-token" >> "${GITHUB_ENV}"

    - name: Mask GCP credential file paths
      shell: bash
      run: |
        for var in GOOGLE_GHA_CREDS_PATH GOOGLE_APPLICATION_CREDENTIALS CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE; do
          val="${!var:-}"
          if [[ -n "${val}" ]]; then
            echo "::add-mask::${val}"
          fi
        done

    - name: Prepare sandbox credentials
      shell: bash
      run: bash scripts/prepare-sandbox-credentials.sh
